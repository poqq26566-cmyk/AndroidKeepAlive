apply plugin: 'com.android.application'

android {
    namespace 'com.yourpackage'
    compileSdk 34

    defaultConfig {
        applicationId 'com.yourpackage.keepalive'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'

        externalNativeBuild {
            cmake {
                cppFlags '-O2 -fPIC'
                abiFilters 'arm64-v8a'
            }
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }

    externalNativeBuild {
        cmake {
            path 'src/main/jni/CMakeLists.txt'
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
